import pandas as pd

# Load 5 sub-model prediction CSVs
sub1 = pd.read_csv('submission_TestSubV7.csv')       # Master Code
sub2 = pd.read_csv('submission_Ensemble_Model2.csv')  # Variant 1
sub3 = pd.read_csv('submission_Ensemble_Model3.csv')  # Variant 2
sub4 = pd.read_csv('submission_Ensemble_Model4.csv')  # Variant 3
sub5 = pd.read_csv('submission_Ensemble_Model5.csv')  # Variant 4

# Rename columns for merge
for i, sub in enumerate([sub1, sub2, sub3, sub4, sub5], 1):
    sub.columns = ['id', f'Depression_sub{i}']

# Merge all predictions on ID
merged = sub1.copy()
for sub in [sub2, sub3, sub4, sub5]:
    merged = merged.merge(sub, on='id', how='left')

# Average → round → integer
dep_cols = [f'Depression_sub{i}' for i in range(1, 6)]
merged['Depression'] = merged[dep_cols].mean(axis=1).round().astype(int)

# Final submission
