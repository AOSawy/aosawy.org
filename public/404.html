<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — A.O. Sawy</title>
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#0f0f1a">
  <link rel="stylesheet" href="/design-system.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f5f5f7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
    }
    .nav-404 {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      padding: 0 32px;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; height: 56px;
    }
    .nav-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.05rem; font-weight: 700;
      color: #1d1d1f; text-decoration: none; letter-spacing: -0.01em;
    }
    .content-404 {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 120px 24px 60px;
      text-align: center;
    }
    .code-404 {
      font-size: 8rem; font-weight: 800; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #0071e3, #40a9ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .title-404 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem; font-weight: 700; margin: 1rem 0 0.75rem;
      color: #1d1d1f;
    }
    .desc-404 {
      font-size: 1rem; color: #6e6e73; max-width: 420px;
      line-height: 1.6; margin-bottom: 2rem;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 10px;
      background: #0071e3; color: #fff;
      text-decoration: none; font-weight: 600; font-size: 0.95rem;
      transition: background 0.2s ease;
    }
    .btn-home:hover { background: #005bb5; }
    @media (max-width: 768px) {
      .code-404 { font-size: 5rem; }
      .title-404 { font-size: 1.5rem; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="nav-404">
    <div class="nav-inner">
      <a href="/" class="nav-name">A. Sawy</a>
    </div>
  </header>
  <main class="content-404">
    <div class="code-404">404</div>
    <h1 class="title-404">Page Not Found</h1>
    <p class="desc-404">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Homepage
    </a>
  </main>
</body>
</html>
